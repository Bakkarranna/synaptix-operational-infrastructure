    <style>
      html {
        font-size: 80%;
      }
      body {
        font-family: 'Inter', 'sans-serif';
        background-color: #F9FAFB;
        color: #374151;
        transition: background-color 0.3s ease, color 0.3s ease;
        /* Hide main scrollbar for a cleaner look */
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }
      body::-webkit-scrollbar {
        display: none; /* Chrome, Safari, Opera */
      }
      .dark body {
        background-color: #000000;
        color: #e0e0e0;
      }
      .hover\\:pause:hover {
        animation-play-state: paused;
      }
      .prose {
        --tw-prose-body: theme('colors.gray.700');
        --tw-prose-headings: theme('colors.gray.900');
        --tw-prose-lead: theme('colors.gray.600');
        --tw-prose-links: theme('colors.primary');
        --tw-prose-bold: theme('colors.gray.900');
        --tw-prose-counters: theme('colors.gray.500');
        --tw-prose-bullets: theme('colors.primary');
        --tw-prose-hr: theme('colors.gray.200');
        --tw-prose-quotes: theme('colors.gray.900');
        --tw-prose-quote-borders: theme('colors.primary');
        --tw-prose-captions: theme('colors.gray.500');
        --tw-prose-code: theme('colors.gray.900');
        --tw-prose-pre-code: theme('colors.gray.700');
        --tw-prose-pre-bg: theme('colors.gray.100');
        --tw-prose-th-borders: theme('colors.gray.300');
        --tw-prose-td-borders: theme('colors.gray.200');
        --tw-prose-invert-body: theme('colors.white/80');
        --tw-prose-invert-headings: theme('colors.white');
        --tw-prose-invert-lead: theme('colors.white/90');
        --tw-prose-invert-links: theme('colors.primary');
        --tw-prose-invert-bold: theme('colors.white');
        --tw-prose-invert-counters: theme('colors.white/60');
        --tw-prose-invert-bullets: theme('colors.primary');
        --tw-prose-invert-hr: theme('colors.white/10');
        --tw-prose-invert-quotes: theme('colors.white/90');
        --tw-prose-invert-quote-borders: theme('colors.primary');
        --tw-prose-invert-captions: theme('colors.white/70');
        --tw-prose-invert-code: theme('colors.white');
        --tw-prose-invert-pre-code: theme('colors.white/80');
        --tw-prose-invert-pre-bg: theme('colors.black/20');
        --tw-prose-invert-th-borders: theme('colors.white/20');
        --tw-prose-invert-td-borders: theme('colors.white/10');
      }
      /* Custom Blog Heading Styles */
      .prose h2, .prose h3, .prose h4 {
        font-weight: 700; /* bold */
      }
      .dark .prose h2, .dark .prose h3, .dark .prose h4 {
        color: theme('colors.white');
      }
      .prose h2 {
        font-size: 2em;
      }
      .prose h3 {
        font-size: 1.6em;
      }
      .prose h4 {
        font-size: 1.3em;
      }
      /* Custom Table Font Size for Blog Articles */
      .prose table th, .prose table td {
        font-size: 0.8em; /* Smaller font on mobile */
        padding: 0.4rem 0.5rem; /* Tighter padding on mobile */
      }
      /* Restore original size for desktop */
      @media (min-width: 768px) {
        .prose table th, .prose table td {
          font-size: 0.9em;
          padding: 0.5rem 0.75rem;
        }
      }
      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      /* Custom, theme-aware scrollbar */
      .custom-scrollbar {
        /* For Firefox */
        scrollbar-width: thin;
        scrollbar-color: #9CA3AF transparent;
      }
      .dark .custom-scrollbar {
        scrollbar-color: #4B5563 transparent;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #9CA3AF; /* A neutral gray for light mode */
        border-radius: 10px;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #4B5563; /* A darker gray for dark mode */
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #FF5630; /* Brand primary color on hover */
      }
       /* Responsive Tables for Blog Articles */
      @media (max-width: 768px) {
        .prose table {
          border: 0;
        }
        .prose table thead {
          /* Hide thead, but keep for accessibility */
          border: none;
          clip: rect(0 0 0 0);
          height: 1px;
          margin: -1px;
          overflow: hidden;
          padding: 0;
          position: absolute;
          width: 1px;
        }
        .prose table tr {
          display: block;
          margin-bottom: 1rem;
          border-radius: 0.5rem;
          border: 1px solid theme('colors.white/10');
          background-color: theme('colors.white/5');
          box-shadow: none;
        }
        .prose table td {
          display: block;
          text-align: right; /* Align content to the right */
          position: relative;
          padding-left: 50% !important; /* Make space for the label */
          border-bottom: 1px solid theme('colors.white/10');
        }
        .prose table td:last-child {
          border-bottom: 0;
        }
        .prose table td::before {
          content: attr(data-label);
          position: absolute;
          left: 1rem;
          top: 50%;
          transform: translateY(-50%);
          width: 45%;
          padding-right: 0.5rem;
          white-space: nowrap;
          text-align: left;
          font-weight: 700;
          color: theme('colors.primary');
        }
      }
      /* --- Autofill Styles --- */
      /* Light mode autofill override */
      input:-webkit-autofill,
      input:-webkit-autofill:hover,
      input:-webkit-autofill:focus,
      input:-webkit-autofill:active,
      textarea:-webkit-autofill,
      textarea:-webkit-autofill:hover,
      textarea:-webkit-autofill:focus,
      textarea:-webkit-autofill:active {
          transition: background-color 5000s ease-in-out 0s;
          -webkit-text-fill-color: #1f2937 !important;
          -webkit-box-shadow: 0 0 0 30px #ffffff4d inset !important;
      }

      /* Dark mode autofill override */
      .dark input:-webkit-autofill,
      .dark input:-webkit-autofill:hover,
      .dark input:-webkit-autofill:focus,
      .dark input:-webkit-autofill:active,
      .dark textarea:-webkit-autofill,
      .dark textarea:-webkit-autofill:hover,
      .dark textarea:-webkit-autofill:focus,
      .dark textarea:-webkit-autofill:active {
          -webkit-text-fill-color: #FFF !important;
          -webkit-box-shadow: 0 0 0 30px #0000004d inset !important;
      }
    </style>
